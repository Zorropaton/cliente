<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opciones de Entrega</title>
    <!-- Incluyendo Tailwind CSS desde el CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Usando la fuente Inter para un look más moderno */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-teal-500 to-cyan-700 p-4">

    <!-- Contenedor principal -->
    <div class="w-full max-w-md p-8 space-y-4 bg-white rounded-xl shadow-2xl text-center">
        
        <!-- Enlace para Lista Normal (Actualizado) -->
        <a href="https://zorropaton.github.io/Consolidado/index2.html" 
           class="block w-full text-left p-5 bg-blue-600 text-white rounded-lg transition-all duration-300 ease-in-out hover:bg-blue-700 hover:-translate-y-1 hover:shadow-lg">
            
            <!-- Título del botón -->
            <span class="block text-lg font-semibold mb-1">
                Lista Normal
            </span>
            
            <!-- Subtítulo del botón -->
            <span class="block text-sm font-normal opacity-90">
                Entrega de productos 24 horas
            </span>
        </a>

        <!-- Enlace para Consolidado -->
        <a href="https://zorropaton.github.io/Consolidado/consolidado.html" 
           class="block w-full text-left p-5 bg-gray-600 text-white rounded-lg transition-all duration-300 ease-in-out hover:bg-gray-700 hover:-translate-y-1 hover:shadow-lg">
            
            <!-- Título del botón -->
            <span class="block text-lg font-semibold mb-1">
                Consolidado
            </span>
            
            <!-- Subtítulo del botón -->
            <span class="block text-sm font-normal opacity-90">
                Entrega en 48-72 hrs
            </span>
        </a>

    </div>

</body>
</html>
